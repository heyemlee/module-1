<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Technical Design · Layout Preview</title>
    <style>
      :root {
        --ink: #1d1d1b;
        --line: #dfe1df;
        --cabinet: #f7f7f4;
        --dimension: #079ca5;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f4f1;
        color: var(--ink);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      main {
        width: min(1080px, calc(100vw - 48px));
        padding: 24px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 14px;
        letter-spacing: .13em;
        font-size: 11px;
        color: #666863;
      }

      header strong { color: var(--ink); font-size: 12px; }
      .sheet {
        border: 1px solid #d7d9d6;
        background-color: #fbfbf9;
        background-image:
          linear-gradient(rgba(25,25,23,.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(25,25,23,.045) 1px, transparent 1px);
        background-size: 28px 28px;
        padding: 34px;
      }

      .drawing-label {
        margin: 0 0 12px;
        color: #68706c;
        font-size: 10px;
        letter-spacing: .12em;
      }
      .drawing-label + svg { margin-bottom: 42px; }

      svg { display: block; width: 100%; height: auto; }
      .wall { stroke: var(--ink); stroke-width: 4; fill: none; }
      .cabinet { fill: var(--cabinet); stroke: var(--ink); stroke-width: 1.5; }
      .upper { fill: none; stroke: var(--ink); stroke-width: 1.25; stroke-dasharray: 6 4; }
      .appliance { fill: #fff; stroke: var(--ink); stroke-width: 1.5; }
      .detail { stroke: var(--ink); stroke-width: 1.15; fill: none; }
      .dimension { stroke: var(--dimension); stroke-width: 1.5; fill: none; }
      .dimension-text { fill: var(--dimension); font-size: 11px; font-weight: 700; }
      .note { fill: #68706c; font-size: 10px; letter-spacing: .08em; }
      .label { fill: var(--ink); font-size: 11px; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <strong>TECHNICAL DESIGN · PROPOSAL</strong>
        <span>STYLE PREVIEW · NO LOGIC CHANGES</span>
      </header>

      <section class="sheet" aria-label="Cabinet proposal layout style preview">
        <p class="drawing-label">ELEVATION · WALL A</p>
        <svg viewBox="0 0 980 390" role="img" aria-label="Clean cabinet elevation drawing">
          <!-- Teal dimensions stay as the only accent color -->
          <g class="dimension">
            <path d="M 164 38 H 804 M 164 32 V 44 M 804 32 V 44" />
            <path d="M 164 62 H 284 M 164 56 V 68 M 284 56 V 68" />
            <path d="M 284 62 H 372 M 284 56 V 68 M 372 56 V 68" />
            <path d="M 372 62 H 548 M 372 56 V 68 M 548 56 V 68" />
            <path d="M 548 62 H 644 M 548 56 V 68 M 644 56 V 68" />
            <path d="M 644 62 H 804 M 644 56 V 68 M 804 56 V 68" />
            <path d="M 126 120 V 332 M 120 120 H 132 M 120 332 H 132" />
            <path d="M 146 120 V 208 M 140 120 H 152 M 140 208 H 152" />
            <path d="M 146 244 V 332 M 140 244 H 152 M 140 332 H 152" />
          </g>
          <g class="dimension-text" text-anchor="middle">
            <text x="484" y="31">150″</text>
            <text x="224" y="58">24″</text><text x="328" y="58">21″</text>
            <text x="460" y="58">36″</text><text x="596" y="58">24″</text>
            <text x="724" y="58">33″</text>
            <text x="130" y="230" transform="rotate(-90 130 230)">96″</text>
            <text x="150" y="164" transform="rotate(-90 150 164)">36″</text>
            <text x="150" y="288" transform="rotate(-90 150 288)">36″</text>
          </g>

          <!-- Solid cabinet outlines with one neutral cabinet fill -->
          <line class="detail" x1="164" y1="244" x2="804" y2="244" stroke-width="2" />
          <line class="upper" x1="164" y1="112" x2="804" y2="112" />
          <rect class="cabinet" x="164" y="120" width="120" height="88" />
          <rect class="cabinet" x="284" y="120" width="88" height="88" />
          <rect class="cabinet" x="372" y="120" width="176" height="88" />
          <rect class="cabinet" x="548" y="120" width="96" height="88" />
          <rect class="cabinet" x="644" y="120" width="160" height="88" />
          <rect class="cabinet" x="164" y="244" width="120" height="88" />
          <rect class="cabinet" x="284" y="244" width="88" height="88" />
          <rect class="cabinet" x="372" y="244" width="176" height="88" />
          <rect class="cabinet" x="548" y="244" width="96" height="88" />
          <rect class="cabinet" x="644" y="244" width="160" height="88" />

          <!-- Uppers use black dashed fronts only -->
          <path class="upper" d="M 372 120 L 460 208 L 548 120" />
          <path class="upper" d="M 644 120 L 724 208 L 804 120" />
          <!-- Minimal appliance symbols stay black -->
          <rect class="appliance" x="398" y="255" width="124" height="66" rx="2" />
          <path class="detail" d="M 460 255 v-22 m-12 0 h24" />
          <rect class="appliance" x="560" y="250" width="72" height="76" />
          <path class="detail" d="M 568 261 H 624 M 592 270 h8" />
          <text class="note" x="442" y="104">WINDOW · 30″</text>
        </svg>

        <p class="drawing-label">PLAN · WALL A / WALL B</p>
        <svg viewBox="0 0 980 620" role="img" aria-label="Clean cabinet plan drawing">
          <!-- Walls -->
          <path class="wall" d="M 92 124 H 868 M 92 124 V 552" />

          <!-- Top base run: one neutral cabinet color -->
          <rect class="cabinet" x="102" y="134" width="132" height="54" />
          <rect class="cabinet" x="234" y="134" width="96" height="54" />
          <rect class="cabinet" x="330" y="134" width="150" height="54" />
          <rect class="cabinet" x="480" y="134" width="94" height="54" />
          <rect class="cabinet" x="574" y="134" width="162" height="54" />

          <!-- Upper projection: black dashed only -->
          <rect class="upper" x="102" y="134" width="132" height="27" />
          <rect class="upper" x="330" y="134" width="150" height="27" />
          <rect class="upper" x="574" y="134" width="162" height="27" />

          <!-- Sink + dishwasher details -->
          <rect class="appliance" x="350" y="144" width="110" height="34" rx="2" />
          <path class="detail" d="M 405 144 v-18 m-11 0 h22 m-11 0 c0-9 12-9 12 0" />
          <rect class="appliance" x="490" y="142" width="72" height="38" />
          <path class="detail" d="M 498 151 H 554 M 526 159 h8" />

          <!-- Left return -->
          <rect class="cabinet" x="102" y="188" width="54" height="102" />

          <rect class="upper" x="102" y="188" width="27" height="102" />
          <rect class="upper" x="102" y="432" width="27" height="110" />

          <!-- Corner cabinet: clean black outline -->
          <path class="cabinet" d="M 102 134 H 234 V 188 H 156 V 290 H 102 Z" />
          <circle class="detail" cx="139" cy="171" r="16" stroke-dasharray="4 3" />

          <!-- Opening / window stays as a thin black dashed reference -->
          <path class="upper" d="M 480 118 H 574" />
          <text class="note" x="503" y="128">WINDOW · 30″</text>

          <!-- Teal dimensions only -->
          <g class="dimension">
            <path d="M 102 104 H 234 M 102 98 V 110 M 234 98 V 110" />
            <path d="M 234 104 H 330 M 234 98 V 110 M 330 98 V 110" />
            <path d="M 330 104 H 480 M 330 98 V 110 M 480 98 V 110" />
            <path d="M 480 104 H 574 M 480 98 V 110 M 574 98 V 110" />
            <path d="M 574 104 H 736 M 574 98 V 110 M 736 98 V 110" />

            <path d="M 62 188 V 542 M 56 188 H 68 M 56 542 H 68" />
            <path d="M 82 188 V 290 M 76 188 H 88 M 76 290 H 88" />
            <path d="M 82 290 V 432 M 76 290 H 88 M 76 432 H 88" />
            <path d="M 82 432 V 542 M 76 432 H 88 M 76 542 H 88" />

            <!-- Upper corner cabinet dimensions: short, consistent leaders -->
            <path d="M 102 64 H 234 M 102 64 v10 M 234 64 v10" />
            <path d="M 42 134 V 236 M 42 134 h10 M 42 236 h10" />
          </g>
          <g class="dimension-text" text-anchor="middle">
            <text x="168" y="100">36″</text>
            <text x="282" y="100">21″</text>
            <text x="405" y="100">36″</text>
            <text x="527" y="100">24″</text>
            <text x="655" y="100">33″</text>
            <text x="66" y="365" transform="rotate(-90 66 365)">B · 120″</text>
            <text x="86" y="239" transform="rotate(-90 86 239)">36″</text>
            <text x="86" y="361" transform="rotate(-90 86 361)">36″</text>
            <text x="86" y="487" transform="rotate(-90 86 487)">36″</text>
            <text x="168" y="58">24″</text>
            <text x="31" y="185" transform="rotate(-90 31 185)">24″</text>
          </g>

          <text class="label" x="102" y="584">CABINET PROPOSAL · CLEAN LINE STUDY</text>
        </svg>
      </section>
    </main>
  </body>
</html>
