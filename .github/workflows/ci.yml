name: CI

on:
  push:
    branches: [main]
  pull_request:

# Closes the verification loop automatically: the same three checks run by hand
# (tsc + tests + build) now gate every push to main and every PR. No DB/secrets
# needed — tests mock the data layer and `next build` does not connect.
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
